# Giftcred backend — run on your whitelisted-IP VPS
#
# Setup:
#   cp .env.example .env    # fill in Woohoo, DATABASE_URL, AUTH_SECRET, CORS_ORIGINS
#   docker compose up -d --build
#
# Logs:  docker compose logs -f api
# Stop:  docker compose down

services:
  api:
    build: .
    image: giftcred-api:latest
    container_name: giftcred-api
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
